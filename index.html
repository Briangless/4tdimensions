<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060612">
<title>La Cuarta Dimensión</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ease-out: cubic-bezier(0.23,1,0.32,1);
    --ease-in-out: cubic-bezier(0.77,0,0.175,1);
    --bg: #060612;
    --surface: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.45);
    --accent: #7c6ffc;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    padding: 20px 20px 0;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 400ms var(--ease-out) 100ms forwards;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 340px;
  }

  /* ── Canvas ── */
  .canvas-wrap {
    position: relative;
    width: 100%;
    flex: 1 1 auto;
    min-height: 240px;
    max-height: 420px;
    margin-top: 16px;
    opacity: 0;
    animation: fadeIn 600ms var(--ease-out) 250ms forwards;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .w-label {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  /* ── Controls ── */
  .controls {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 400ms var(--ease-out) 400ms forwards;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 70px;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 120ms var(--ease-out), box-shadow 120ms var(--ease-out);
  }

  input[type=range]:active::-webkit-slider-thumb {
    transform: scale(1.2);
    box-shadow: 0 0 0 6px rgba(124,111,252,0.2);
  }

  input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .slider-val {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    min-width: 34px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Buttons ── */
  .btns {
    display: flex;
    gap: 8px;
    padding-top: 2px;
  }

  button {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 140ms var(--ease-out), transform 100ms var(--ease-out), border-color 140ms;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  button:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.1);
  }

  button.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Pills ── */
  .pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 4px 20px 28px;
    opacity: 0;
    animation: fadeIn 400ms var(--ease-out) 600ms forwards;
  }

  .pill {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    header, .canvas-wrap, .controls, .pills,
    input[type=range]::-webkit-slider-thumb { animation: none; transition: none; opacity: 1; transform: none; }
  }

  @media (min-width: 500px) {
    header { padding: 28px 28px 0; }
    .controls { padding: 16px 28px 20px; }
    .pills { padding: 4px 28px 32px; }
    .canvas-wrap { max-height: 460px; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Simulación interactiva</p>
  <h1>La Cuarta<br>Dimensión</h1>
  <p class="subtitle">Un tesseract (hipercubo 4D) proyectado en tu pantalla. Rota en planos que no existen en nuestro universo.</p>
</header>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
  <span class="w-label">eje W →</span>
</div>

<div class="controls">
  <div class="slider-row">
    <span class="slider-label">Rotación XW</span>
    <input type="range" id="sXW" min="0" max="200" value="60" step="1">
    <span class="slider-val" id="vXW">0.60°</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Rotación YW</span>
    <input type="range" id="sYW" min="0" max="200" value="40" step="1">
    <span class="slider-val" id="vYW">0.40°</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Perspectiva 4D</span>
    <input type="range" id="sPD" min="150" max="500" value="280" step="1">
    <span class="slider-val" id="vPD">280</span>
  </div>
  <div class="btns">
    <button id="btnPlay" class="active">Pausar</button>
    <button id="btnMode">Sólido</button>
    <button id="btnReset">Reiniciar</button>
  </div>
</div>

<div class="pills">
  <span class="pill">Tesseract</span>
  <span class="pill">16 vértices 4D</span>
  <span class="pill">32 aristas</span>
  <span class="pill">Proyección 4D→2D</span>
</div>

<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    const wrap = canvas.parentElement;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // 16 vertices of a tesseract: all combinations of ±1 in 4D
  const verts4 = Array.from({length:16}, (_, i) => [
    (i&1)?1:-1, (i&2)?1:-1, (i&4)?1:-1, (i&8)?1:-1
  ]);

  // Edges: vertices that differ in exactly one coordinate
  const edges = [];
  for (let i = 0; i < 16; i++)
    for (let j = i+1; j < 16; j++) {
      let d = 0;
      for (let k = 0; k < 4; k++) if (verts4[i][k] !== verts4[j][k]) d++;
      if (d === 1) edges.push([i, j]);
    }

  // Face quads (each pair of parallel edges forms a face)
  const faces = [
    [0,1,3,2],[4,5,7,6],[0,1,5,4],[2,3,7,6],[0,2,6,4],[1,3,7,5],
    [8,9,11,10],[12,13,15,14],[8,9,13,12],[10,11,15,14],[8,10,14,12],[9,11,15,13],
    [0,8,9,1],[2,10,11,3],[4,12,13,5],[6,14,15,7],
    [0,8,12,4],[1,9,13,5],[2,10,14,6],[3,11,15,7]
  ];

  let aXW=0,aYW=0,aZW=0,aXY=0,aXZ=0;
  let speedXW=0.006, speedYW=0.004, speedZW=0.0022;
  let persD=280;
  let running=true, solid=false;

  function rot(v, a, b, angle) {
    const c=Math.cos(angle), s=Math.sin(angle), r=[...v];
    r[a]=v[a]*c-v[b]*s; r[b]=v[a]*s+v[b]*c;
    return r;
  }

  function proj4to3(v) {
    const w = persD / (persD - v[3]*1.5);
    return [v[0]*w, v[1]*w, v[2]*w, w];
  }

  function proj3to2(v, fov) {
    const z = fov / (fov - v[2]*55);
    return [v[0]*z, v[1]*z, z];
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    const scale=Math.min(W,H)*0.23;
    const fov=Math.min(W,H)*1.2;

    const rotated = verts4.map(v => {
      let r = rot(v,0,3,aXW);
      r = rot(r,1,3,aYW);
      r = rot(r,2,3,aZW);
      r = rot(r,0,1,aXY);
      r = rot(r,0,2,aXZ);
      return r;
    });

    const p3 = rotated.map(proj4to3);
    const p2 = p3.map(p => {
      const q = proj3to2(p, fov);
      return [cx+q[0]*scale, cy-q[1]*scale, p[3]];
    });

    if (solid) {
      const sorted = faces.map(f => ({
        f, avgW: f.reduce((s,i)=>s+p3[i][3],0)/f.length
      })).sort((a,b)=>a.avgW-b.avgW);

      sorted.forEach(({f, avgW}) => {
        const hue = (avgW*180+200)%360;
        const alpha = Math.max(0.04, Math.min(0.4, (avgW-0.5)*0.55));
        ctx.beginPath();
        ctx.moveTo(p2[f[0]][0], p2[f[0]][1]);
        for (let i=1; i<f.length; i++) ctx.lineTo(p2[f[i]][0], p2[f[i]][1]);
        ctx.closePath();
        ctx.fillStyle = `hsla(${hue},75%,68%,${alpha})`;
        ctx.fill();
        ctx.strokeStyle = `hsla(${hue},80%,72%,0.55)`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      });
    } else {
      edges.forEach(([a,b]) => {
        const avgW=(p2[a][2]+p2[b][2])/2;
        const hue=(avgW*180+200)%360;
        const alpha=Math.max(0.15, Math.min(0.95, avgW*0.85));
        ctx.beginPath();
        ctx.moveTo(p2[a][0],p2[a][1]);
        ctx.lineTo(p2[b][0],p2[b][1]);
        ctx.strokeStyle=`hsla(${hue},80%,70%,${alpha})`;
        ctx.lineWidth=Math.max(0.5, avgW*1.6);
        ctx.stroke();
      });

      p2.forEach(([x,y,w]) => {
        const hue=(w*180+200)%360;
        ctx.beginPath();
        ctx.arc(x, y, Math.max(1.5, w*3.5), 0, Math.PI*2);
        ctx.fillStyle=`hsla(${hue},85%,72%,${Math.min(1,w*0.9)})`;
        ctx.fill();
      });
    }
  }

  function tick() {
    if (running) {
      aXW+=speedXW; aYW+=speedYW; aZW+=speedZW;
      aXY+=speedXW*0.28; aXZ+=speedYW*0.18;
    }
    draw();
    requestAnimationFrame(tick);
  }
  tick();

  // Touch drag to rotate
  let lastTouch=null;
  canvas.addEventListener('touchstart', e=>{ lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
  canvas.addEventListener('touchmove', e=>{
    if (!lastTouch) return;
    const dx=e.touches[0].clientX-lastTouch.x;
    const dy=e.touches[0].clientY-lastTouch.y;
    aXY+=dx*0.008; aXW+=dy*0.005;
    lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});
  canvas.addEventListener('touchend',()=>{ lastTouch=null; },{passive:true});

  // Mouse drag
  let mouse=null;
  canvas.addEventListener('mousedown', e=>{ mouse={x:e.clientX,y:e.clientY}; });
  window.addEventListener('mousemove', e=>{
    if(!mouse) return;
    const dx=e.clientX-mouse.x, dy=e.clientY-mouse.y;
    aXY+=dx*0.006; aXW+=dy*0.004;
    mouse={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mouseup',()=>{ mouse=null; });

  function updateSpeeds() {
    speedXW = +document.getElementById('sXW').value/10000;
    speedYW = +document.getElementById('sYW').value/10000;
    persD   = +document.getElementById('sPD').value;
    document.getElementById('vXW').textContent = (speedXW*100).toFixed(2)+'°';
    document.getElementById('vYW').textContent = (speedYW*100).toFixed(2)+'°';
    document.getElementById('vPD').textContent = Math.round(persD);
  }

  ['sXW','sYW','sPD'].forEach(id=>document.getElementById(id).addEventListener('input',updateSpeeds));

  document.getElementById('btnPlay').addEventListener('click',function(){
    running=!running;
    this.textContent=running?'Pausar':'Reanudar';
    this.classList.toggle('active',running);
  });

  document.getElementById('btnMode').addEventListener('click',function(){
    solid=!solid;
    this.textContent=solid?'Malla':'Sólido';
    this.classList.toggle('active',solid);
  });

  document.getElementById('btnReset').addEventListener('click',function(){
    aXW=aYW=aZW=aXY=aXZ=0;
    document.getElementById('sXW').value=60;
    document.getElementById('sYW').value=40;
    document.getElementById('sPD').value=280;
    running=true;
    solid=false;
    document.getElementById('btnPlay').textContent='Pausar';
    document.getElementById('btnPlay').classList.add('active');
    document.getElementById('btnMode').textContent='Sólido';
    document.getElementById('btnMode').classList.remove('active');
    updateSpeeds();
  });

  updateSpeeds();
})();
</script>
</body>
</html>
